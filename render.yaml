services:
  - type: web             # ← web service (exposes HTTP port)
    name: telegram-2in1-bot
    env: docker
    envVars:
      - key: BOT_TOKEN
        sync: false       # set manually in Render dashboard
      - key: WEBHOOK_URL
        sync: false       # set to your Render URL, e.g. https://telegram-2in1-bot.onrender.com
